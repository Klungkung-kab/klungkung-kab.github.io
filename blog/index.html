<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO META -->
    <title>Blog · Kabupaten Klungkung</title>
    <meta name="description" content="Blog resmi Kabupaten Klungkung. Berisi artikel, berita, informasi pembangunan, wisata, dan budaya daerah.">
    <meta name="keywords" content="blog klungkung, berita klungkung, artikel bali, nusa penida, kerta gosa">
    <meta name="robots" content="index, follow">

    <!-- Open Graph -->
    <meta property="og:title" content="Blog · Kabupaten Klungkung">
    <meta property="og:description" content="Kumpulan artikel dan informasi terkini dari Kabupaten Klungkung">
    <meta property="og:url" content="https://klungkung-kab.github.io/blog/">
    <meta property="og:type" content="website">

    <!-- Tailwind & Font Awesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #1e4b8f, #0f2b55); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <!-- HEADER -->
    <header class="bg-white shadow-sm sticky top-0 z-10 border-b border-gray-200">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2 text-gray-700 hover:text-blue-700 transition">
                <i class="fa-solid fa-arrow-left"></i>
                <span>Kembali ke Beranda</span>
            </a>
            <a href="/blog/" class="font-semibold text-gray-800 flex items-center gap-2">
                <span class="w-7 h-7 rounded-lg gradient-bg text-white inline-flex items-center justify-center text-xs">ᬓ᭄</span>
                <span>Blog Klungkung</span>
            </a>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex-1 max-w-4xl mx-auto px-4 py-8 w-full">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2 flex items-center gap-2">
                <i class="fa-regular fa-newspaper text-blue-700"></i>
                Blog Kabupaten Klungkung
            </h1>
            <p class="text-gray-600">Daftar lengkap artikel, berita, dan informasi:</p>
        </div>

        <!-- CONTAINER LIST BLOG -->
        <div id="blog-list" class="bg-white rounded-xl shadow-sm border border-gray-100 divide-y">
            <div class="p-8 text-center text-gray-400">
                <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i>
                <p>Memuat daftar artikel...</p>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="border-t border-gray-200 py-6 text-center text-sm text-gray-500">
        <p>Kabupaten Klungkung · Blog dan Informasi Resmi</p>
    </footer>

    <script>
        // KONFIGURASI
        const USERNAME = 'klungkung-kab';
        const REPO = 'klungkung-kab.github.io';
        const BRANCH = 'main';
        const FOLDER = 'blog';

        // BASE URL YANG BENAR
        const BASE_URL = `https://${USERNAME}.github.io/${FOLDER}`;

        async function loadBlogPosts() {
            try {
                const apiUrl = `https://api.github.com/repos/${USERNAME}/${REPO}/contents/${FOLDER}?ref=${BRANCH}`;
                console.log('Fetching:', apiUrl);
                
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error(`Gagal memuat (${response.status})`);
                }

                const data = await response.json();

                // Filter file HTML (kecuali index.html)
                const posts = data.filter(item => 
                    item.type === 'file' && 
                    item.name.toLowerCase().endsWith('.html') && 
                    item.name.toLowerCase() !== 'index.html'
                );

                if (posts.length === 0) {
                    document.getElementById('blog-list').innerHTML = `
                        <div class="p-12 text-center">
                            <i class="fa-regular fa-folder-open text-5xl text-gray-300 mb-3"></i>
                            <p class="text-gray-500">Belum ada artikel blog</p>
                            <p class="text-sm text-gray-400 mt-2">Upload file .html ke folder /blog/</p>
                        </div>
                    `;
                    return;
                }

                // Urutkan berdasarkan nama (A-Z)
                posts.sort((a, b) => a.name.localeCompare(b.name));

                // Buat daftar HTML
                let html = `
                    <div class="px-6 py-3 bg-blue-50 text-sm text-blue-700 flex items-center gap-2">
                        <i class="fa-regular fa-rectangle-list"></i>
                        <span>Ditemukan ${posts.length} artikel</span>
                    </div>
                `;

                posts.forEach((file, index) => {
                    // Buat judul dari nama file
                    let judul = file.name
                        .replace('.html', '')
                        .replace(/[-_]/g, ' ')
                        .replace(/\b\w/g, l => l.toUpperCase());
                    
                    // URL yang benar
                    const postUrl = `${BASE_URL}/${encodeURIComponent(file.name)}`;
                    
                    html += `
                        <a href="${postUrl}" 
                           class="block px-6 py-5 hover:bg-blue-50 transition flex items-start gap-4 group"
                           aria-label="Baca artikel: ${judul}">
                            <span class="w-7 h-7 rounded-full gradient-bg text-white flex items-center justify-center flex-shrink-0 text-xs">
                                ${index + 1}
                            </span>
                            <div class="flex-1">
                                <h2 class="text-lg font-medium text-gray-800 group-hover:text-blue-700">${judul}</h2>
                                <div class="flex items-center gap-3 text-xs text-gray-400 mt-1">
                                    <span><i class="fa-regular fa-file-code mr-1"></i>${file.name}</span>
                                    <span><i class="fa-regular fa-calendar mr-1"></i>${new Date().toLocaleDateString('id-ID')}</span>
                                </div>
                            </div>
                            <i class="fa-solid fa-chevron-right text-gray-300 group-hover:text-blue-400 mt-2"></i>
                        </a>
                    `;
                });

                document.getElementById('blog-list').innerHTML = html;

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('blog-list').innerHTML = `
                    <div class="p-8 text-center text-red-500">
                        <i class="fa-regular fa-circle-exclamation text-3xl mb-2"></i>
                        <p>Gagal memuat daftar artikel</p>
                        <p class="text-sm text-red-400 mt-2">${error.message}</p>
                        <button onclick="location.reload()" 
                                class="mt-3 bg-red-100 text-red-600 px-4 py-2 rounded-lg text-sm hover:bg-red-200 transition">
                            <i class="fa-solid fa-rotate-right mr-1"></i> Coba Lagi
                        </button>
                    </div>
                `;
            }
        }

        // Jalankan
        document.addEventListener('DOMContentLoaded', loadBlogPosts);
    </script>
</body>
</html>
